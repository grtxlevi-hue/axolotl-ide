<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Python Cloud IDE</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.4.12/ace.js"></script>
    <script src="https://cdn.jsdelivr.net/pyodide/v0.23.4/full/pyodide.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.14.0/Sortable.min.js"></script>
    
    <style>
        :root { --bg: #070a13; --panel: #0f1423; --neon: #00ffcc; --green: #2ecc71; }
        body { margin: 0; height: 100vh; background: var(--bg); color: #fff; font-family: sans-serif; display: flex; flex-direction: column; overflow: hidden; }
        
        /* Compact Navbar */
        .navbar { background: var(--panel); padding: 5px; border-bottom: 1px solid #222; display: flex; align-items: center; gap: 5px; }
        .controls-scroll { display: flex; gap: 5px; overflow-x: auto; flex-grow: 1; padding: 2px; }
        .controls-scroll::-webkit-scrollbar { display: none; }
        .btn { background: #1a2234; border: none; color: #fff; padding: 6px 10px; border-radius: 4px; font-size: 11px; white-space: nowrap; cursor: pointer; }
        .run-btn { background: var(--green); font-weight: bold; }

        .workspace { display: flex; flex-grow: 1; overflow: hidden; }
        .sidebar { width: 120px; background: #0b0f19; border-right: 1px solid #222; font-size: 11px; display: flex; flex-direction: column; transition: 0.3s; }
        .sidebar.hidden { width: 0; opacity: 0; }
        .file-item { padding: 8px; border-bottom: 1px solid #222; display: flex; justify-content: space-between; align-items: center; }
        
        #editor { flex-grow: 1; background: #090d16 !important; }
        .terminal { height: 25%; background: #000; border-top: 1px solid #333; overflow: auto; padding: 10px; font-size: 12px; }
        .shortcut-bar { background: #0a0d14; padding: 5px; display: flex; gap: 5px; overflow-x: auto; }
    </style>
</head>
<body>

<div class="navbar">
    <button class="btn" onclick="toggleSidebar()">📁</button>
    <div class="controls-scroll" id="nav-controls">
        <button class="btn" onclick="adjustFontSize(1)">A+</button>
        <button class="btn" onclick="adjustFontSize(-1)">A-</button>
        <button class="btn" onclick="downloadCode()">💾</button>
        <button class="btn" id="sortBtn" onclick="toggleSorting()">⚙️</button>
        <button class="btn" onclick="insertSnippet('for')">Loop</button>
    </div>
    <button class="btn run-btn" onclick="executePython()">▶ RUN</button>
</div>

<div class="workspace">
    <div class="sidebar" id="sidebar">
        <div style="padding:5px; font-weight:bold; color:var(--neon)">FILES <span onclick="createNewFile()">[+]</span></div>
        <div id="file-list"></div>
    </div>
    <div id="editor"></div>
</div>

<div class="terminal" id="output">🐍 Console ready...</div>

<script>
    // Initialization
    const tg = Telegram.WebApp; tg.ready(); tg.expand();
    const editor = ace.edit("editor");
    editor.setOptions({ fontSize: "14px", theme: "ace/theme/monokai", mode: "ace/mode/python" });

    let userId = tg.initDataUnsafe?.user?.id || "local";
    let files = JSON.parse(localStorage.getItem(userId)) || {"main.py": "print('Hello')"};
    let activeFile = "main.py";

    function renderFiles() {
        const list = document.getElementById('file-list');
        list.innerHTML = "";
        Object.keys(files).forEach(f => {
            list.innerHTML += `<div class="file-item" onclick="switchFile('${f}')">
                ${f} <span onclick="deleteFile('${f}'); event.stopPropagation()">🗑️</span>
            </div>`;
        });
    }

    function switchFile(f) {
        files[activeFile] = editor.getValue();
        activeFile = f;
        editor.setValue(files[f], -1);
    }

    function deleteFile(f) {
        if(Object.keys(files).length > 1) {
            delete files[f];
            if(activeFile === f) switchFile(Object.keys(files)[0]);
            renderFiles();
            localStorage.setItem(userId, JSON.stringify(files));
        } else { alert("Cannot delete last file!"); }
    }

    function createNewFile() {
        let name = prompt("Name:");
        if(name) { files[name+".py"] = ""; renderFiles(); }
    }

    // Sortable implementation
    let sortable;
    function toggleSorting() {
        const container = document.getElementById('nav-controls');
        if(!sortable) {
            sortable = Sortable.create(container, { animation: 150 });
            document.getElementById('sortBtn').innerText = "✅";
        } else {
            sortable.destroy(); sortable = null;
            document.getElementById('sortBtn').innerText = "⚙️";
        }
    }

    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('hidden'); }
    function adjustFontSize(d) { let s = parseInt(editor.getFontSize()); editor.setFontSize((s+d)+"px"); }
    function downloadCode() { /* logic same as before */ }
    function insertSnippet(t) { editor.insert("for i in range(5):\n    print(i)"); }

    // Init
    editor.setValue(files[activeFile], -1);
    renderFiles();

    async function executePython() {
        // Run logic same as before...
    }
</script>
</body>
</html>
