<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Axolotl Premium Editor</title>
    <!-- Telegram WebApp SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <!-- Ace Editor CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.4.12/ace.js"></script>
    <!-- Pyodide Compiler -->
    <script src="https://cdn.jsdelivr.net/pyodide/v0.23.4/full/pyodide.js"></script>
    
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background-color: #151515; color: #e0e0e0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; display: flex; flex-direction: column; overflow: hidden; }
        
        /* Navbar Header */
        .navbar { display: flex; justify-content: space-between; align-items: center; background: #1e1e1e; padding: 10px 15px; border-bottom: 1px solid #2d2d2d; box-shadow: 0 2px 5px rgba(0,0,0,0.3); height: 45px; box-sizing: border-box; }
        .title { font-weight: bold; font-size: 14px; color: #a6e22e; font-family: monospace; }
        .run-btn { background: #2ecc71; color: #fff; border: none; padding: 6px 14px; font-weight: bold; border-radius: 4px; cursor: pointer; font-size: 13px; }
        
        /* Layout Wrappers */
        .main-container { display: flex; flex-direction: column; flex-grow: 1; height: calc(100% - 45px); position: relative; }
        #editor { flex-grow: 1; width: 100%; background: #1e1e1e; font-size: 16px; }
        
        /* Terminal Window */
        .terminal-panel { height: 25%; background: #0c0c0c; border-top: 1px solid #2d2d2d; display: flex; flex-direction: column; box-sizing: border-box; }
        .terminal-header { background: #1a1a1a; padding: 6px 15px; font-size: 11px; font-weight: bold; color: #888; letter-spacing: 1px; border-bottom: 1px solid #222; }
        #output { flex-grow: 1; padding: 12px; margin: 0; overflow-y: auto; font-family: 'Courier New', Courier, monospace; font-size: 14px; color: #00ff66; white-space: pre-wrap; word-break: break-all; }
        
        /* 🚨 Acode Style Fixed Keyboard Toolbar (From Image 1783358313885.jpeg) 🚨 */
        .shortcut-bar { 
            position: fixed; 
            bottom: 0; 
            left: 0; 
            width: 100%; 
            background: #1c2024; /* Dark gray background like image */
            border-top: 1px solid #2d3139; 
            display: grid;
            grid-template-rows: repeat(2, 1fr); /* 2 rows exactly like image */
            gap: 2px;
            padding: 4px 2px;
            box-sizing: border-box;
            z-index: 9999;
        }
        .shortcut-row {
            display: flex;
            overflow-x: auto;
            gap: 4px;
            padding: 2px 4px;
            -webkit-overflow-scrolling: touch;
        }
        .shortcut-row::-webkit-scrollbar { display: none; }
        
        /* Buttons design matching Image 1783358313885.jpeg */
        .shortcut-btn { 
            background: transparent; 
            color: #ffffff; 
            border: none;
            border-radius: 4px; 
            min-width: 44px; 
            height: 34px; 
            font-family: monospace; 
            font-size: 14px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            cursor: pointer; 
            user-select: none; 
            -webkit-user-select: none;
            font-weight: 500;
        }
        .shortcut-btn:active { background: #2d3139; color: #a6e22e; }
        .special-btn { font-size: 11px; color: #b0b5c0; font-weight: bold; } /* For CTRL, SHFT, ESC */

        /* Prevent bar from hiding editor content */
        .padding-bottom-fix { height: 80px; background: #1e1e1e; }
    </style>
</head>
<body>

    <div class="navbar">
        <div class="title">📄 main.py</div>
        <button class="run-btn" onclick="executePython()">▶ RUN</button>
    </div>

    <div class="main-container">
        <!-- The IDE Container -->
        <div id="editor"># Write Python code here
def test():
    print("Keyboard toolbar is working perfectly!")

test()
</div>
        <div class="padding-bottom-fix"></div>
    </div>

    <!-- The Embedded Terminal -->
    <div class="terminal-panel">
        <div class="terminal-header">CONSOLE TERMINAL</div>
        <pre id="output">⏳ Loading Core Framework...</pre>
    </div>

    <!-- 🛠️ Real Acode-Inspired Dual Row Sticky Keyboard Overlay -->
    <div class="shortcut-bar" id="keyboard-bar">
        <!-- Row 1: Commands -->
        <div class="shortcut-row">
            <div class="shortcut-btn special-btn">CTRL</div>
            <div class="shortcut-btn special-btn" onclick="insertSymbol('    ')">➔|</div> <!-- Tab -->
            <div class="shortcut-btn special-btn">SHFT</div>
            <div class="shortcut-btn special-btn" onclick="editor.undo()">↩</div>
            <div class="shortcut-btn special-btn" onclick="editor.redo()">↪</div>
            <div class="shortcut-btn special-btn">🔍</div>
            <div class="shortcut-btn special-btn">💾</div>
            <div class="shortcut-btn special-btn">ESC</div>
        </div>
        <!-- Row 2: Pure Coding Symbols -->
        <div class="shortcut-row">
            <div class="shortcut-btn" onclick="insertSymbol(';')">;</div>
            <div class="shortcut-btn" onclick="insertSymbol('\'')">'</div>
            <div class="shortcut-btn" onclick="insertSymbol('\"')">"</div>
            <div class="shortcut-btn" onclick="insertSymbol('&')">&amp;</div>
            <div class="shortcut-btn" onclick="insertSymbol('|')">|</div>
            <div class="shortcut-btn" onclick="insertSymbol('=')">=</div>
            <div class="shortcut-btn" onclick="insertSymbol('/')">/</div>
            <div class="shortcut-btn" onclick="insertSymbol('!')">!</div>
            <div class="shortcut-btn" onclick="insertSymbol(':')">:</div>
            <div class="shortcut-btn" onclick="insertSymbol('(')">(</div>
            <div class="shortcut-btn" onclick="insertSymbol(')')">)</div>
            <div class="shortcut-btn" onclick="insertSymbol('[')">[</div>
            <div class="shortcut-btn" onclick="insertSymbol(']')">]</div>
            <div class="shortcut-btn" onclick="insertSymbol('{')">{</div>
            <div class="shortcut-btn" onclick="insertSymbol('}')">}</div>
        </div>
    </div>

    <script>
        const tg = Telegram.WebApp;
        tg.ready();
        tg.expand(); 

        const editor = ace.edit("editor");
        editor.setTheme("ace/theme/monokai");
        editor.session.setMode("ace/mode/python");
        editor.setShowPrintMargin(false);
        editor.setOptions({
            enableBasicAutocompletion: true,
            enableLiveAutocompletion: true,
            useSoftTabs: true,
            tabSize: 4,
            fontSize: "16px",
            wrap: true
        });

        function insertSymbol(symbol) {
            editor.insert(symbol);
            editor.focus();
        }

        // 🚨 Dynamic Visual Viewport adjustment for Keyboard 🚨
        // Jab mobile keyboard khulega, ye event use automatic toolbar ko upar push kar dega
        if (window.visualViewport) {
            window.visualViewport.addEventListener('resize', () => {
                const keyboardBar = document.getElementById('keyboard-bar');
                const heightDiff = window.innerHeight - window.visualViewport.height;
                if (heightDiff > 0) {
                    // Keyboard is visible, overlay bar on top of it
                    keyboardBar.style.bottom = heightDiff + 'px';
                } else {
                    // Keyboard is hidden
                    keyboardBar.style.bottom = '0px';
                }
            });
        }

        let pyodideObj = null;
        const consoleOut = document.getElementById("output");

        async function initCompiler() {
            try {
                pyodideObj = await loadPyodide();
                consoleOut.innerText = "🐍 Python 3.11 Environment Ready.\nClick 'RUN' to execute code.";
                consoleOut.style.color = "#888";
            } catch(e) {
                consoleOut.innerText = "❌ System failed to load environment.";
            }
        }
        initCompiler();

        async function executePython() {
            if (!pyodideObj) return;
            const rawCode = editor.getValue();
            consoleOut.innerText = "⚡ Running...\n";
            consoleOut.style.color = "#00ff66";

            pyodideObj.runPython(`
                import sys
                import io
                sys.stdout = io.StringIO()
                sys.stderr = io.StringIO()
            `);

            try {
                await pyodideObj.runPythonAsync(rawCode);
                const stdout = pyodideObj.runPython("sys.stdout.getvalue()");
                const stderr = pyodideObj.runPython("sys.stderr.getvalue()");
                consoleOut.innerText = (stdout + stderr) || "💡 Finished with no stdout.";
            } catch (err) {
                consoleOut.style.color = "#ff3333";
                consoleOut.innerText = "🛑 Error:\n" + err;
            }
        }
    </script>
</body>
</html>
