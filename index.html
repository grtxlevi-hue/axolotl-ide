<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Professional Cyberpunk IDE</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.4.12/ace.js"></script>
    <script src="https://cdn.jsdelivr.net/pyodide/v0.23.4/full/pyodide.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.14.0/Sortable.min.js"></script>
    
    <style>
        :root { --bg-dark: #0b0f19; --panel-bg: #111827; --accent-neon: #00ffcc; --accent-green: #2ecc71; --text-gray: #9ca3af; }
        body, html { margin: 0; padding: 0; height: 100%; background-color: var(--bg-dark); color: #e5e7eb; font-family: sans-serif; display: flex; flex-direction: column; overflow: hidden; }
        
        .navbar { background: #1e222b; border-bottom: 2px solid #282c34; padding: 6px 12px; display: flex; flex-direction: column; gap: 6px; }
        .nav-top { display: flex; justify-content: space-between; align-items: center; }
        .title { font-weight: bold; color: var(--accent-neon); font-family: monospace; }
        .nav-controls { display: flex; gap: 6px; overflow-x: auto; padding: 2px 0; }
        .nav-controls::-webkit-scrollbar { display: none; }
        
        .nav-btn { background: #1f2937; color: #fff; border: 1px solid #374151; padding: 6px 10px; border-radius: 6px; cursor: pointer; font-size: 12px; white-space: nowrap; }
        .run-btn { background: #4b6fff; color: white; border: none; padding: 6px 14px; font-weight: bold; }

        .main-container { flex-grow: 1; display: flex; flex-direction: column; height: calc(100% - 110px); }
        #editor { flex-grow: 1; width: 100%; }

        /* Acode Style Output Console */
        #console-panel { height: 35%; background: #111318; border-top: 2px solid #282c34; display: flex; flex-direction: column; }
        .console-header { background: #1e222b; padding: 6px 12px; font-size: 11px; color: #abb2bf; font-weight: bold; }
        #console-output { flex-grow: 1; padding: 10px; overflow-y: auto; font-family: 'Courier New', monospace; font-size: 14px; white-space: pre-wrap; color: #98c379; }
        .error-text { color: #e06c75; }

        /* Shortcut Bar */
        .shortcut-bar { position: fixed; bottom: 0; width: 100%; background: #0d111a; border-top: 1px solid #242b35; padding: 4px 2px; z-index: 9999; }
        .shortcut-row { display: flex; gap: 4px; overflow-x: auto; padding: 2px; }
        .shortcut-btn { background: #161c26; color: white; border: 1px solid #242b35; padding: 8px; border-radius: 4px; min-width: 40px; text-align: center; font-family: monospace; }
        .padding-bottom-fix { height: 90px; }
    </style>
</head>
<body>

    <div class="navbar">
        <div class="nav-top">
            <div class="title">main.py</div>
            <button class="nav-btn run-btn" onclick="executePython()">RUN CODE</button>
        </div>
        <div class="nav-controls" id="controls-row">
            <select class="nav-btn" onchange="editor.setTheme(this.value)">
                <option value="ace/theme/monokai">Monokai</option>
                <option value="ace/theme/dracula">Dracula</option>
            </select>
            <button class="nav-btn" onclick="editor.setFontSize(editor.getFontSize()+2)">➕</button>
            <button class="nav-btn" onclick="editor.setFontSize(editor.getFontSize()-2)">➖</button>
            <button class="nav-btn" onclick="toggleSorting()">⚙️ Sort</button>
        </div>
    </div>

    <div class="main-container">
        <div id="editor"></div>
        <div class="padding-bottom-fix"></div>
    </div>

    <div id="console-panel">
        <div class="console-header">OUTPUT CONSOLE</div>
        <div id="console-output">Ready...</div>
    </div>

    <div class="shortcut-bar" id="keyboard-bar">
        <div class="shortcut-row" id="row1">
            <div class="shortcut-btn" onclick="insertSymbol(';')">;</div>
            <div class="shortcut-btn" onclick="insertSymbol('\'')">'</div>
            <div class="shortcut-btn" onclick="insertSymbol('\"')">"</div>
            <div class="shortcut-btn" onclick="insertSymbol('=')">=</div>
            <div class="shortcut-btn" onclick="insertSymbol('(')">(</div>
            <div class="shortcut-btn" onclick="insertSymbol(')')">)</div>
        </div>
    </div>

    <script>
        const editor = ace.edit("editor");
        editor.setTheme("ace/theme/monokai");
        editor.session.setMode("ace/mode/python");

        let pyodide = null;
        let hasError = false;
        const out = document.getElementById("console-output");

        async function init() {
            pyodide = await loadPyodide();
            out.innerText = "Python Ready!";
        }
        init();

        function insertSymbol(s) { editor.insert(s); editor.focus(); }

        function acodeInputBridge(promptText) {
            if (hasError) return "";
            let res = prompt(promptText);
            out.innerText += (promptText || "") + (res || "") + "\n";
            return res || "";
        }

        async function executePython() {
            out.innerHTML = ""; hasError = false;
            pyodide.runPython(`
                import sys, io, builtins
                from js import acodeInputBridge
                sys.stdout = io.StringIO()
                builtins.input = acodeInputBridge
            `);
            try {
                await pyodide.runPythonAsync(editor.getValue());
                out.innerText += pyodide.runPython("sys.stdout.getvalue()");
            } catch (err) {
                hasError = true;
                let eDiv = document.createElement('div');
                eDiv.className = 'error-text';
                eDiv.innerText = err;
                out.appendChild(eDiv);
            }
        }

        function toggleSorting() {
            const row = document.getElementById('row1');
            if(!window.sortable) { window.sortable = Sortable.create(row); }
            else { window.sortable.destroy(); window.sortable = null; }
        }
    </script>
</body>
</html>
