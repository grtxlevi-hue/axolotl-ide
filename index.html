<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acode Style Python IDE</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.4.12/ace.js"></script>
    <script src="https://cdn.jsdelivr.net/pyodide/v0.23.4/full/pyodide.js"></script>
    <style>
        body { margin: 0; display: flex; flex-direction: column; height: 100vh; background: #15181f; color: #e1e4ea; font-family: sans-serif; }
        .navbar { background: #1e222b; padding: 10px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #282c34; }
        #editor { flex-grow: 1; }
        
        /* Acode Style Output Console */
        #console-panel { height: 35%; background: #111318; border-top: 2px solid #282c34; display: flex; flex-direction: column; }
        .console-header { background: #1e222b; padding: 6px 12px; font-size: 12px; color: #abb2bf; font-weight: bold; border-bottom: 1px solid #282c34; }
        #console-output { flex-grow: 1; padding: 10px; overflow-y: auto; font-family: 'Courier New', monospace; font-size: 14px; white-space: pre-wrap; color: #98c379; }
        .error-text { color: #e06c75; }
        
        #run-btn { padding: 8px 20px; background: #4b6fff; border: none; color: white; cursor: pointer; font-size: 14px; font-weight: bold; border-radius: 4px; }
        #run-btn:active { background: #3554d1; }
    </style>
</head>
<body>

    <div class="navbar">
        <span style="font-family: monospace;">main.py</span>
        <button id="run-btn" onclick="executePython()">RUN CODE</button>
    </div>

    <div id="editor"># Write your Python code here
name = input("Enter your name: ")
print("Hello, " + name)
print("Execution done.")</div>

    <!-- Acode Terminal Structure -->
    <div id="console-panel">
        <div class="console-header">OUTPUT CONSOLE</div>
        <div id="console-output">Terminal ready...</div>
    </div>

    <script>
        const editor = ace.edit("editor");
        editor.setTheme("ace/theme/one_dark"); // Acode default look
        editor.session.setMode("ace/mode/python");
        editor.setShowPrintMargin(false);

        let pyodide = null;
        const consoleOutput = document.getElementById("console-output");
        let hasErrorOccurred = false;

        async function init() {
            consoleOutput.innerText = "Loading Python Core...";
            pyodide = await loadPyodide();
            consoleOutput.innerText = "Python 3.11 Environment Ready!";
        }
        init();

        // Safe Input Logic like Acode
        function acodeInputBridge(promptText) {
            // Agar pehle hi koi error aa chuka hai, toh input standard error bypass karega
            if (hasErrorOccurred) {
                return "";
            }
            
            let userInput = prompt(promptText || "Input required:");
            if (userInput === null) userInput = ""; // Handle cancel
            
            // Print the input back to console to look like a real terminal stream
            consoleOutput.innerText += (promptText || "") + userInput + "\n";
            return userInput;
        }

        async function executePython() {
            consoleOutput.innerHTML = ""; 
            hasErrorOccurred = false; // Reset error flag
            const code = editor.getValue();
            
            // Redirect stdout and hook input
            pyodide.runPython(`
                import sys, io, builtins
                from js import acodeInputBridge
                sys.stdout = io.StringIO()
                builtins.input = acodeInputBridge
            `);

            try {
                await pyodide.runPythonAsync(code);
                const output = pyodide.runPython("sys.stdout.getvalue()");
                // Append output safely
                if(output) {
                    consoleOutput.innerText += output;
                }
            } catch (err) {
                hasErrorOccurred = true; // Block further inputs instantly
                let errorDiv = document.createElement('div');
                errorDiv.className = 'error-text';
                errorDiv.innerText = err.message || err;
                consoleOutput.appendChild(errorDiv);
            }
            
            // Scroll to bottom
            consoleOutput.scrollTop = consoleOutput.scrollHeight;
        }
    </script>
</body>
</html>
