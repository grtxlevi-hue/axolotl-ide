<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Axolotl Spotify-X Premium Core</title>
    
    <style>
        :root {
            --bg-deep: #05070a;
            --panel-glass: rgba(10, 18, 30, 0.85);
            --accent-glow: #ff0000; 
            --accent-glow-cyan: #00ffcc;
            --accent-purple: #bd00ff;
            --accent-pink: #ff007f;
            --text-main: #f1f5f9;
            --text-muted: #64748b;
            --glow-shadow: 0 0 25px rgba(255, 0, 0, 0.35);
        }

        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%; 
            background: radial-gradient(circle at 50% 0%, #1a0e0e 0%, var(--bg-deep) 80%); 
            color: var(--text-main); font-family: 'Segoe UI', Roboto, sans-serif; 
            display: flex; flex-direction: column; overflow: hidden; 
        }

        .app-container { display: flex; flex-direction: column; height: 100%; width: 100%; position: relative; }

        .app-header {
            display: flex; flex-direction: column; gap: 12px;
            padding: 16px 20px; background: rgba(5, 7, 10, 0.7); backdrop-filter: blur(25px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05); z-index: 100;
        }
        .header-top { display: flex; justify-content: space-between; align-items: center; width: 100%; }
        .header-title { font-size: 19px; font-weight: 800; color: #fff; }
        .header-title span { color: var(--accent-glow); text-shadow: var(--glow-shadow); }
        
        .search-wrapper { position: relative; width: 100%; }
        .search-input {
            width: 100%; padding: 12px 16px 12px 42px; background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 0, 0, 0.25); border-radius: 14px; color: #fff;
            font-size: 14px; outline: none; box-sizing: border-box; transition: all 0.3s;
        }
        .search-input:focus { border-color: var(--accent-glow); box-shadow: var(--glow-shadow); background: rgba(255,255,255,0.12); }
        .search-icon-inside { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--accent-glow); font-size: 16px; }

        .view-content {
            flex-grow: 1; overflow-y: auto; padding: 16px 20px 130px 20px;
            display: flex; flex-direction: column; gap: 24px; -webkit-overflow-scrolling: touch;
        }
        .view-content::-webkit-scrollbar { display: none; }
        .app-view { display: none; flex-direction: column; gap: 20px; }
        .app-view.active { display: flex; }

        .recommend-slider { display: flex; gap: 14px; overflow-x: auto; padding-bottom: 8px; scroll-behavior: smooth; }
        .recommend-slider::-webkit-scrollbar { display: none; }
        .recommend-card {
            flex: 0 0 140px; background: var(--panel-glass); border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 18px; padding: 12px; display: flex; flex-direction: column; gap: 8px; cursor: pointer;
            transition: all 0.2s;
        }
        .recommend-card:hover { border-color: var(--accent-glow); transform: translateY(-3px); }

        .results-container { display: flex; flex-direction: column; gap: 10px; }
        .track-strip {
            display: flex; align-items: center; justify-content: space-between;
            padding: 12px; background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 16px; cursor: pointer; transition: all 0.2s;
        }
        .track-strip:hover, .track-strip.active { background: rgba(255, 0, 0, 0.08); border-color: rgba(255, 0, 0, 0.3); }
        .strip-info { display: flex; align-items: center; gap: 12px; overflow: hidden; width: 80%; }
        .strip-avatar { width: 46px; height: 46px; border-radius: 12px; background: #162030; background-size: cover; background-position: center; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 20px; }
        .strip-text { display: flex; flex-direction: column; overflow: hidden; }
        .strip-title { font-size: 13.5px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #fff; }
        .strip-sub { font-size: 11px; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .strip-play-btn { width: 32px; height: 32px; border-radius: 50%; background: rgba(255,255,255,0.08); display: flex; align-items: center; justify-content: center; font-size: 12px; color: #fff; flex-shrink: 0; }
        .track-strip.active .strip-play-btn { background: var(--accent-glow); color: #fff; font-weight: bold; box-shadow: var(--glow-shadow); }

        .player-view-wrapper { display: flex; flex-direction: column; align-items: center; gap: 22px; text-align: center; width: 100%; }
        .immersive-art-frame {
            width: 68%; aspect-ratio: 1; border-radius: 32px; background: #152232; background-size: cover; background-position: center;
            box-shadow: 0 15px 40px rgba(0,0,0,0.7), 0 0 45px rgba(255, 0, 0, 0.15);
            border: 2px solid rgba(255, 0, 0, 0.25); margin-top: 10px; display: flex; align-items: center; justify-content: center; font-size: 72px;
        }
        .player-meta-info { width: 100%; display: flex; flex-direction: column; gap: 4px; }
        .player-track-name { font-size: 21px; font-weight: 800; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .player-artist-name { font-size: 14px; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        .canvas-box { width: 100%; height: 45px; position: relative; }
        #waveVisualizer { width: 100%; height: 100%; }

        .timeline-box { width: 100%; display: flex; flex-direction: column; gap: 6px; }
        .time-slider { -webkit-appearance: none; width: 100%; height: 4px; border-radius: 2px; background: rgba(255,255,255,0.1); outline: none; accent-color: var(--accent-glow); cursor: pointer; }
        .time-labels { display: flex; justify-content: space-between; font-size: 11px; color: var(--text-muted); font-family: monospace; }
        .player-controls { display: flex; gap: 24px; align-items: center; margin-top: 5px; }
        .ctrl-btn { background: rgba(255,255,255,0.06); color: #fff; border: none; padding: 14px 20px; font-size: 16px; border-radius: 50%; cursor: pointer; }
        .ctrl-btn.main-play { background: var(--accent-glow); color: #fff; padding: 18px 24px; font-size: 22px; box-shadow: var(--glow-shadow); font-weight: bold; }

        .bottom-audio-pill {
            position: fixed; bottom: 94px; left: 50%; transform: translateX(-50%);
            width: 88%; max-width: 400px; height: 56px; border-radius: 16px;
            background: linear-gradient(90deg, rgba(48, 18, 18, 0.95), rgba(22, 8, 8, 0.95));
            backdrop-filter: blur(15px); border: 1px solid rgba(255, 0, 0, 0.25);
            box-shadow: 0 8px 25px rgba(0,0,0,0.5), var(--glow-shadow);
            display: none; align-items: center; justify-content: space-between; padding: 0 14px; box-sizing: border-box; z-index: 99998; cursor: pointer;
        }
        .pill-track-info { display: flex; align-items: center; gap: 10px; overflow: hidden; max-width: 70%; }
        .pill-art { width: 36px; height: 36px; border-radius: 8px; background: #351616; background-size: cover; background-position: center; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 16px; }
        .pill-text { display: flex; flex-direction: column; overflow: hidden; }
        .pill-title { font-size: 12px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #fff; }
        .pill-desc { font-size: 10px; color: var(--accent-glow); font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .pill-btn-play { width: 32px; height: 32px; border-radius: 50%; background: var(--accent-glow); color: #fff; display: flex; align-items: center; justify-content: center; font-size: 12px; border: none; cursor: pointer; font-weight: bold; }

        .floating-navbar {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: 88%; max-width: 400px; height: 64px; border-radius: 22px;
            background: rgba(10, 15, 26, 0.85); backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.08); box-shadow: 0 12px 35px rgba(0,0,0,0.6);
            display: flex; justify-content: space-around; align-items: center; z-index: 99999; padding: 0 8px; box-sizing: border-box;
        }
        .nav-tab-item { display: flex; flex-direction: column; align-items: center; gap: 4px; color: var(--text-muted); cursor: pointer; min-width: 50px; }
        .nav-tab-item.active { color: var(--accent-glow); }
        .nav-tab-icon { font-size: 20px; }
        .nav-tab-label { font-size: 9px; font-weight: 700; text-transform: uppercase; }

        #toast-notification { position: fixed; top: 155px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.9); color: var(--accent-glow-cyan); padding: 8px 18px; border-radius: 20px; font-size: 11px; font-weight: bold; border: 1px solid var(--accent-glow-cyan); opacity: 0; transition: opacity 0.3s; z-index: 100000; pointer-events: none; text-align: center; }
    </style>
</head>
<body>

    <div id="toast-notification">Connecting Axolotl Cluster...</div>

    <div style="position: absolute; width:1px; height:1px; opacity:0; pointer-events:none; overflow:hidden;">
        <audio id="tgSecureAudioEngine" playsinline prelaod="auto"></audio>
    </div>

    <div class="app-container">
        <div class="app-header">
            <div class="header-top">
                <div class="header-title">🪐 Axolotl <span>Premium Core</span></div>
                <div style="cursor:pointer;" onclick="showToast('⚡ Telegram Engine Active')">📡</div>
            </div>
            <div class="search-wrapper">
                <span class="search-icon-inside">🔍</span>
                <input type="text" class="search-input" id="spotifySearchInput" placeholder="Search any Song, Remix or Artist..." onkeyup="handleSearchTrigger(event)">
            </div>
        </div>

        <div class="view-content">
            <div class="app-view active" id="view-home">
                <div class="section-title" style="font-size:14px; font-weight:700;">🔥 Hot Curated Recommendations</div>
                <div class="recommend-slider" id="recommendationsOutput"></div>

                <div class="section-title" id="search-title-context" style="font-size:14px; font-weight:700; margin-top:10px;">Trending Worldwide Live Feed</div>
                <div class="results-container" id="songsResultsOutput"></div>
            </div>

            <div class="app-view" id="view-library">
                <div class="section-title" style="font-size:14px; font-weight:700;">Your Playback Tracks History</div>
                <div class="results-container" id="libraryTracksOutput"></div>
            </div>

            <div class="app-view" id="view-playing">
                <div class="player-view-wrapper">
                    <div class="immersive-art-frame" id="player-art">🎵</div>
                    
                    <div class="player-meta-info">
                        <div class="player-track-name" id="player-title">No Track Active</div>
                        <div class="player-artist-name" id="player-artist">Search any track to play in Telegram</div>
                    </div>

                    <div class="canvas-box">
                        <canvas id="waveVisualizer"></canvas>
                    </div>

                    <div class="timeline-box">
                        <input type="range" class="time-slider" id="trackScrubber" min="0" max="100" value="0" oninput="scrubAudio(this.value)">
                        <div class="time-labels">
                            <span id="time-current">0:00</span>
                            <span id="time-total">0:00</span>
                        </div>
                    </div>

                    <div class="player-controls">
                        <button class="ctrl-btn" onclick="adjustTrack(-1)">⏮</button>
                        <button class="ctrl-btn main-play" id="masterPlayPauseBtn" onclick="togglePlayback(event)">▶</button>
                        <button class="ctrl-btn" onclick="adjustTrack(1)">⏭</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="bottom-audio-pill" id="audio-pill-bar" onclick="switchView('playing')">
            <div class="pill-track-info">
                <div class="pill-art" id="pill-art-icon">🎵</div>
                <div class="pill-text">
                    <div class="pill-title" id="pill-track-name">No track active</div>
                    <div class="pill-desc" id="pill-track-artist">Select track</div>
                </div>
            </div>
            <button class="pill-btn-play" id="pill-play-trigger" onclick="togglePlayback(event)">▶</button>
        </div>

        <div class="floating-navbar">
            <div class="nav-tab-item active" id="tab-home" onclick="switchView('home')">
                <div class="nav-tab-icon">🏠</div><div class="nav-tab-label">Home</div>
            </div>
            <div class="nav-tab-item" id="tab-library" onclick="switchView('library')">
                <div class="nav-tab-icon">📚</div><div class="nav-tab-label">Library</div>
            </div>
            <div class="nav-tab-item" id="tab-playing" onclick="switchView('playing')">
                <div class="nav-tab-icon">🎵</div><div class="nav-tab-label">Playing</div>
            </div>
        </div>
    </div>

    <script>
        let currentTracksList = [];
        let currentTrackIndex = 0;
        let nativePlayer = document.getElementById('tgSecureAudioEngine');
        let uiProgressTimer = null;
        let animationFrameId = null;

        // Invidious proxies array ko optimize kiya stable endpoints ke saath
        const proxyInstances = [
            "https://iv.melmac.space",
            "https://invidious.perennialte.ch",
            "https://invidious.nerdvpn.de",
            "https://invidious.flokinet.to"
        ];

        const curatedRecommendations = [
            { title: "Dekhte Dekhte", artist: "Atif Aslam", image: "https://images.unsplash.com/photo-1614613535308-eb5fbd3d2c17?w=400", url: "w4ClQO58-R4" },
            { title: "Softly", artist: "Karan Aujla", image: "https://images.unsplash.com/photo-1514525253161-7a46d19cd819?w=400", url: "c9Rr6mIDvX4" },
            { title: "Kesariya", artist: "Arijit Singh", image: "https://images.unsplash.com/photo-1511671782779-c97d3d27a1d4?w=400", url: "BddP6PYo2gs" },
            { title: "Starboy", artist: "The Weeknd", image: "https://images.unsplash.com/photo-1470225620780-dba8ba36b745?w=400", url: "jzD_yyEw0M4" }
        ];

        async function runCloudMusicSearch(query) {
            if (!query.trim()) return;
            showToast("🔍 Fetching Secure Clusters...");
            
            let success = false;
            for(let base of proxyInstances) {
                try {
                    const controller = new AbortController();
                    const timeout = setTimeout(() => controller.abort(), 5000);
                    const res = await fetch(`${base}/api/v1/search?q=${encodeURIComponent(query)}&type=video`, { signal: controller.signal });
                    clearTimeout(timeout);

                    if (res.ok) {
                        const data = await res.json();
                        if (data && data.length > 0) {
                            currentTracksList = data.slice(0, 25).map(item => ({
                                title: item.title,
                                artist: item.author || "YouTube Artist",
                                image: item.videoThumbnails && item.videoThumbnails[0] ? item.videoThumbnails[0].url : 'https://images.unsplash.com/photo-1514525253161-7a46d19cd819?w=400',
                                url: item.videoId,
                                streamUrl: `${base}/latest_version?id=${item.videoId}&v=mp4`
                            }));
                            success = true;
                            break;
                        }
                    }
                } catch(e) { console.error("Proxy error, trying next..."); }
            }

            if (success && currentTracksList.length > 0) {
                document.getElementById('search-title-context').innerText = `Results for "${query}"`;
                renderTracksDOM(currentTracksList, 'songsResultsOutput');
                showToast("✨ Stream Packets Ready!");
            } else {
                showToast("⚠️ All proxy clusters full. Try again!");
            }
        }

        function handleSearchTrigger(e) {
            if (e.key === "Enter") {
                runCloudMusicSearch(e.target.value);
                switchView('home');
            }
        }

        function renderTracksDOM(tracks, targetId) {
            const container = document.getElementById(targetId);
            container.innerHTML = "";
            tracks.forEach((track, idx) => {
                const strip = document.createElement('div');
                strip.className = 'track-strip';
                strip.onclick = () => launchAudioStream(idx, tracks);
                const avatarStyle = track.image ? `style="background-image: url('${track.image}')"` : '';
                strip.innerHTML = `
                    <div class="strip-info">
                        <div class="strip-avatar" ${avatarStyle}>${track.image ? '' : '🎵'}</div>
                        <div class="strip-text">
                            <div class="strip-title">${track.title}</div>
                            <div class="strip-sub">${track.artist}</div>
                        </div>
                    </div>
                    <div class="strip-play-btn">▶</div>
                `;
                container.appendChild(strip);
            });
        }

        function buildRecommendations() {
            const container = document.getElementById('recommendationsOutput');
            container.innerHTML = "";
            curatedRecommendations.forEach((track, idx) => {
                const card = document.createElement('div');
                card.className = 'recommend-card';
                card.onclick = () => {
                    const id = track.url || track.videoId;
                    track.streamUrl = `${proxyInstances[0]}/latest_version?id=${id}&v=mp4`;
                    launchAudioStream(idx, curatedRecommendations);
                };
                card.innerHTML = `
                    <div style="width:100%; aspect-ratio:1; border-radius:12px; background-image: url('${track.image}'); background-size:cover; background-position:center;"></div>
                    <div style="font-size:12px; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-top:4px;">${track.title}</div>
                    <div style="font-size:10px; color:var(--text-muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${track.artist}</div>
                `;
                container.appendChild(card);
            });
        }

        function launchAudioStream(index, tracksContext) {
            currentTracksList = tracksContext;
            currentTrackIndex = index;
            const track = currentTracksList[index];
            showToast("⏳ Bypassing Telegram Sandbox...");

            const trackId = track.url || track.videoId;
            if(!track.streamUrl) {
                track.streamUrl = `${proxyInstances[0]}/latest_version?id=${trackId}&v=mp4`;
            }

            nativePlayer.pause();
            nativePlayer.src = track.streamUrl;
            nativePlayer.load();
            
            let playPromise = nativePlayer.play();
            if (playPromise !== undefined) {
                playPromise.then(() => {
                    handlePlaybackStart(track);
                }).catch((err) => {
                    // Failover logic optimized
                    console.log("Primary proxy blocked, switching source...");
                    nativePlayer.src = `${proxyInstances[1]}/latest_version?id=${trackId}&v=mp4`;
                    nativePlayer.play()
                        .then(() => handlePlaybackStart(track))
                        .catch(() => showToast("❌ Sandbox Stream Blocked. Tap Play again."));
                });
            }
        }

        function handlePlaybackStart(track) {
            updateUIElements(track);
            switchView('playing');
            setPlayUI(true);
            startWaveformVisualizer();
            
            clearInterval(uiProgressTimer);
            uiProgressTimer = setInterval(() => {
                if(!nativePlayer.paused) {
                    const cur = nativePlayer.currentTime || 0;
                    const dur = nativePlayer.duration || 1;
                    document.getElementById('trackScrubber').value = (cur / dur) * 100;
                    document.getElementById('time-current').innerText = formatTime(cur);
                    document.getElementById('time-total').innerText = formatTime(dur);
                }
            }, 500);
        }

        function togglePlayback(event) {
            if(event) event.stopPropagation(); // Pill switch view bubble block karne ke liye
            if (nativePlayer.paused) {
                nativePlayer.play().then(() => {
                    setPlayUI(true);
                    startWaveformVisualizer();
                }).catch(() => showToast("⚠️ Playback trigger error"));
            } else {
                nativePlayer.pause();
                setPlayUI(false);
                cancelAnimationFrame(animationFrameId);
            }
        }

        function adjustTrack(dir) {
            if (currentTracksList.length === 0) return;
            let nextIndex = currentTrackIndex + dir;
            if (nextIndex >= currentTracksList.length) nextIndex = 0;
            if (nextIndex < 0) nextIndex = currentTracksList.length - 1;
            launchAudioStream(nextIndex, currentTracksList);
        }

        function updateUIElements(track) {
            document.getElementById('player-title').innerText = track.title;
            document.getElementById('player-artist').innerText = track.artist;
            if(track.image) {
                document.getElementById('player-art').style.backgroundImage = `url('${track.image}')`;
                document.getElementById('player-art').innerText = "";
                document.getElementById('pill-art-icon').style.backgroundImage = `url('${track.image}')`;
                document.getElementById('pill-art-icon').innerText = "";
            }
            document.getElementById('pill-track-name').innerText = track.title;
            document.getElementById('pill-track-artist').innerText = track.artist;
        }

        function setPlayUI(isPlaying) {
            const sym = isPlaying ? "⏸" : "▶";
            document.getElementById('masterPlayPauseBtn').innerText = sym;
            document.getElementById('pill-play-trigger').innerText = sym;
        }

        function switchView(targetViewId) {
            document.querySelectorAll('.app-view').forEach(view => view.classList.remove('active'));
            document.querySelectorAll('.nav-tab-item').forEach(tab => tab.classList.remove('active'));
            document.getElementById(`view-${targetViewId}`).classList.add('active');
            document.getElementById(`tab-${targetViewId}`).classList.add('active');
            
            const isPlayingView = targetViewId === 'playing';
            const hasActiveTrack = currentTracksList.length > 0;
            document.getElementById('audio-pill-bar').style.display = (!isPlayingView && hasActiveTrack) ? 'flex' : 'none';
        }

        function scrubAudio(val) {
            if(!nativePlayer.duration) return;
            nativePlayer.currentTime = (val / 100) * nativePlayer.duration;
        }

        function formatTime(secs) {
            if (isNaN(secs) || !isFinite(secs)) return "0:00";
            let m = Math.floor(secs / 60); let s = Math.floor(secs % 60);
            return `${m}:${s < 10 ? '0' : ''}${s}`;
        }

        function showToast(msg) {
            const t = document.getElementById('toast-notification'); t.innerText = msg; t.style.opacity = 1;
            setTimeout(() => t.style.opacity = 0, 2500);
        }

        const canvas = document.getElementById('waveVisualizer'); const ctx = canvas.getContext('2d'); let phase = 0;
        function resizeCanvas() { canvas.width = canvas.parentElement.clientWidth; canvas.height = canvas.parentElement.clientHeight; }
        window.addEventListener('resize', resizeCanvas); resizeCanvas();

        function startWaveformVisualizer() {
            cancelAnimationFrame(animationFrameId);
            function draw() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.strokeStyle = '#ff0000'; ctx.lineWidth = 3; ctx.shadowBlur = 12; ctx.shadowColor = '#ff0000';
                ctx.beginPath();
                for (let x = 0; x < canvas.width; x++) {
                    let y = canvas.height / 2 + Math.sin(x * 0.03 + phase) * 7 * Math.cos(x * 0.012 + phase);
                    if (x === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
                }
                ctx.stroke(); phase += 0.04; animationFrameId = requestAnimationFrame(draw);
            }
            draw();
        }

        window.onload = () => {
            nativePlayer = document.getElementById('tgSecureAudioEngine');
            buildRecommendations();
            renderTracksDOM(curatedRecommendations, 'libraryTracksOutput');
            renderTracksDOM(curatedRecommendations, 'songsResultsOutput');
        };
    </script>
</body>
</html>
