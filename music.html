<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ViMusic TG Mini App</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body class="bg-[#0d0e12] text-gray-200 min-h-screen p-4 flex flex-col justify-between pb-24 select-none">

    <audio id="audio-player" crossorigin="anonymous"></audio>

    <div>
        <div class="flex justify-between items-center mb-5">
            <div class="flex items-center gap-2">
                <i class="fas fa-compact-disc text-red-500 text-xl animate-spin" style="animation-duration: 4s;"></i>
                <h1 class="text-base font-bold text-white">ViMusic Cloud Node</h1>
            </div>
            <span class="text-[10px] bg-red-500/10 border border-red-500/20 text-red-400 px-2.5 py-1 rounded-full font-medium">TG Live</span>
        </div>

        <div class="bg-white/5 border border-white/10 rounded-2xl flex items-center px-4 py-3 mb-4">
            <i class="fas fa-search text-gray-400 mr-3 text-sm"></i>
            <input type="text" id="search-input" placeholder="Search track, artist, or remix..." class="bg-transparent w-full focus:outline-none text-sm text-white">
        </div>

        <div id="tracks-container" class="space-y-2 overflow-y-auto max-h-[60vh] pr-1">
            <p class="text-xs text-gray-500 text-center py-10">Type song name and press Enter...</p>
        </div>
    </div>

    <div id="mini-player" class="fixed bottom-4 left-4 right-4 bg-[#161822]/90 backdrop-blur-md border border-white/5 rounded-2xl p-3 flex items-center justify-between shadow-2xl hidden">
        <div class="flex items-center gap-3 max-w-[60%]">
            <div class="w-10 h-10 bg-zinc-800 rounded-xl overflow-hidden shrink-0 border border-white/10">
                <img id="player-art" src="" class="w-full h-full object-cover">
            </div>
            <div class="truncate">
                <h4 id="player-title" class="text-xs font-semibold truncate text-white">Song Title</h4>
                <p id="player-artist" class="text-[10px] text-gray-400 mt-0.5 truncate">Artist</p>
            </div>
        </div>
        <div class="flex items-center gap-4 pr-1">
            <button id="play-btn" onclick="togglePlay()" class="w-9 h-9 rounded-full bg-red-500 text-white flex items-center justify-center text-xs shadow-lg"><i class="fas fa-play ml-0.5"></i></button>
        </div>
    </div>

    <script>
        // Init TG WebApp
        if (window.Telegram && window.Telegram.WebApp) {
            window.Telegram.WebApp.ready();
            window.Telegram.WebApp.expand();
        }

        const audio = document.getElementById('audio-player');
        let searchQueue = [];

        // Search Trigger
        document.getElementById('search-input').addEventListener('keypress', async function(e) {
            if (e.key === 'Enter') {
                const query = this.value.trim();
                if (!query) return;

                const container = document.getElementById('tracks-container');
                container.innerHTML = `<p class="text-xs text-gray-400 text-center py-10 animate-pulse"><i class="fas fa-spinner fa-spin mr-2"></i>Fetching from ViMusic cloud...</p>`;

                try {
                    // GitHub open-source Piped/Invidious public API routing
                    const res = await fetch(`https://inv.tux.digital/api/v1/search?q=${encodeURIComponent(query)}&type=video`);
                    const data = await res.json();
                    
                    searchQueue = data.filter(item => item.liveNow === false);
                    container.innerHTML = "";

                    if(searchQueue.length === 0) {
                        container.innerHTML = `<p class="text-xs text-gray-500 text-center py-10">No tracks found.</p>`;
                        return;
                    }

                    searchQueue.forEach((track, idx) => {
                        container.innerHTML += `
                            <div onclick="playTrack(${idx})" class="flex items-center justify-between p-2.5 rounded-xl bg-white/[0.02] border border-white/[0.04] hover:bg-white/5 transition cursor-pointer">
                                <div class="flex items-center gap-3 max-w-[85%]">
                                    <img src="${track.videoThumbnails[0].url}" class="w-11 h-11 rounded-lg object-cover border border-white/5 shrink-0">
                                    <div class="truncate">
                                        <h4 class="text-xs font-semibold truncate text-gray-200">${track.title}</h4>
                                        <p class="text-[10px] text-gray-400 mt-0.5 truncate">${track.author}</p>
                                    </div>
                                </div>
                                <i class="fas fa-play text-[10px] text-red-500 px-2"></i>
                            </div>`;
                    });
                } catch (err) {
                    container.innerHTML = `<p class="text-xs text-red-400 text-center py-10">Server busy. Try again.</p>`;
                }
            }
        });

        function playTrack(idx) {
            const track = searchQueue[idx];
            document.getElementById('player-title').innerText = track.title;
            document.getElementById('player-artist').innerText = track.author;
            document.getElementById('player-art').src = track.videoThumbnails[0].url;
            document.getElementById('mini-player').style.display = 'flex';

            // Extracting pure direct audio stream URL from open-source endpoint
            audio.src = `https://pipedapi.kavin.rocks/streams/${track.videoId}`;
            
            // Resolving direct high-speed audio bypass
            fetch(`https://pipedapi.kavin.rocks/streams/${track.videoId}`)
                .then(res => res.json())
                .then(data => {
                    if(data && data.audioStreams) {
                        // Picking the best quality secure audio file stream
                        const stream = data.audioStreams.find(s => s.mimeType.includes('audio/mp4')) || data.audioStreams[0];
                        audio.src = stream.url;
                        audio.play();
                        document.getElementById('play-btn').innerHTML = '<i class="fas fa-pause"></i>';
                    }
                });
        }

        function togglePlay() {
            if (audio.paused) {
                audio.play();
                document.getElementById('play-btn').innerHTML = '<i class="fas fa-pause"></i>';
            } else {
                audio.pause();
                document.getElementById('play-btn').innerHTML = '<i class="fas fa-play ml-0.5"></i>';
            }
        }
    </script>
</body>
</html>
