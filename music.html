<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AXOLOTL AUDIO DECK ENGINE</title>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;600;700&display=swap');

        :root {
            --neon-glow: #00ffcc;
            --neon-pink: #ff007f;
            --bg-cyber: #030308;
            --card-glass: rgba(12, 12, 26, 0.75);
            --border-neon: rgba(0, 255, 204, 0.2);
            --text-cyber: #e2e8f0;
        }

        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            background-color: var(--bg-cyber);
            background-image: radial-gradient(circle at 50% 10%, #0d1b2a 0%, var(--bg-cyber) 75%);
            color: var(--text-cyber);
            font-family: 'Rajdhani', sans-serif;
            overflow: hidden;
            -webkit-user-select: none; user-select: none;
        }

        .cyber-grid {
            display: flex; flex-direction: column; height: 100%; width: 100%; position: relative;
        }

        /* Premium Dashboard Header */
        .deck-header {
            background: rgba(4, 4, 12, 0.85);
            backdrop-filter: blur(20px);
            border-bottom: 2px solid rgba(0, 255, 204, 0.15);
            padding: 18px 24px;
            box-shadow: 0 4px 30px rgba(0, 255, 204, 0.05);
            z-index: 100;
        }
        .header-meta { display: flex; justify-content: space-between; align-items: center; }
        .branding { font-family: 'Orbitron', sans-serif; font-weight: 900; letter-spacing: 2px; font-size: 20px; color: #fff; }
        .branding span { color: var(--neon-glow); text-shadow: 0 0 15px var(--neon-glow); }
        .system-status { font-size: 12px; color: var(--neon-glow); border: 1px solid var(--neon-glow); padding: 2px 10px; border-radius: 20px; font-weight: bold; background: rgba(0, 255, 204, 0.05); }

        .search-container { margin-top: 14px; position: relative; }
        .search-node {
            width: 100%; padding: 14px 16px 14px 46px; background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-neon); border-radius: 12px; color: #fff;
            font-size: 15px; outline: none; box-sizing: border-box; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-family: 'Rajdhani', sans-serif; font-weight: 600;
        }
        .search-node:focus { 
            border-color: var(--neon-pink); 
            box-shadow: 0 0 20px rgba(255, 0, 127, 0.25);
            background: rgba(255, 255, 255, 0.07);
        }
        .search-icon { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: var(--neon-glow); font-size: 18px; }

        /* Scannable Layout Content */
        .deck-body {
            flex-grow: 1; overflow-y: auto; padding: 20px 24px 140px 24px;
            display: flex; flex-direction: column; gap: 28px; -webkit-overflow-scrolling: touch;
        }
        .deck-body::-webkit-scrollbar { display: none; }
        .deck-view { display: none; flex-direction: column; gap: 22px; }
        .deck-view.active { display: flex; }

        .section-header { font-family: 'Orbitron', sans-serif; font-size: 13px; font-weight: 700; letter-spacing: 1px; color: rgba(255,255,255,0.6); text-transform: uppercase; }

        /* Recommended Slider Grid */
        .slider-matrix { display: flex; gap: 16px; overflow-x: auto; padding-bottom: 5px; }
        .slider-matrix::-webkit-scrollbar { display: none; }
        .cyber-card {
            flex: 0 0 135px; background: var(--card-glass); border: 1px solid rgba(255,255,255,0.05);
            border-radius: 16px; padding: 12px; display: flex; flex-direction: column; gap: 8px; cursor: pointer;
            transition: all 0.25s; position: relative; overflow: hidden;
        }
        .cyber-card:hover { border-color: var(--neon-glow); transform: translateY(-4px); box-shadow: 0 5px 20px rgba(0,255,204,0.1); }
        .card-art { width: 100%; aspect-ratio: 1; border-radius: 10px; background-size: cover; background-position: center; }

        /* Interactive Output Feed Rows */
        .node-list { display: flex; flex-direction: column; gap: 12px; }
        .cyber-row {
            display: flex; align-items: center; justify-content: space-between;
            padding: 14px 16px; background: rgba(255, 255, 255, 0.01);
            border: 1px solid rgba(255,255,255,0.04); border-radius: 14px;
            cursor: pointer; transition: all 0.2s;
        }
        .cyber-row:hover, .cyber-row.active {
            background: rgba(0, 255, 204, 0.05); border-color: var(--neon-glow);
            box-shadow: inset 0 0 15px rgba(0,255,204,0.05);
        }
        .row-meta { display: flex; align-items: center; gap: 14px; overflow: hidden; width: 85%; }
        .row-art { width: 44px; height: 44px; border-radius: 10px; background-size: cover; background-position: center; flex-shrink: 0; background-color: #111222; }
        .row-details { display: flex; flex-direction: column; overflow: hidden; }
        .row-title { font-size: 15px; font-weight: 700; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .row-author { font-size: 12px; color: var(--neon-glow); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .row-action { width: 32px; height: 32px; border-radius: 50%; border: 1px solid rgba(0,255,204,0.3); display: flex; align-items: center; justify-content: center; font-size: 11px; color: var(--neon-glow); }

        /* Immersive Cyber Deck Player UI */
        .immersive-deck { display: flex; flex-direction: column; align-items: center; gap: 26px; width: 100%; }
        .deck-holo-frame {
            width: 72%; aspect-ratio: 1; border-radius: 50%; background-size: cover; background-position: center;
            border: 3px solid var(--neon-glow); box-shadow: 0 0 35px rgba(0, 255, 204, 0.25);
            position: relative; animation: pulseGlow 4s infinite alternate;
        }
        @keyframes pulseGlow { 0% { box-shadow: 0 0 20px rgba(0, 255, 204, 0.2); } 100% { box-shadow: 0 0 45px rgba(255, 0, 127, 0.4); border-color: var(--neon-pink); } }
        
        .meta-display { text-align: center; width: 100%; }
        .meta-title { font-family: 'Orbitron', sans-serif; font-size: 20px; font-weight: 700; color: #fff; }
        .meta-sub { font-size: 14px; color: var(--neon-pink); margin-top: 4px; font-weight: 600; }

        .waveform-container { width: 100%; height: 50px; position: relative; }
        #matrixCanvas { width: 100%; height: 100%; }

        .scrubber-axis { width: 100%; display: flex; flex-direction: column; gap: 8px; }
        .cyber-slider { -webkit-appearance: none; width: 100%; height: 3px; background: rgba(255,255,255,0.1); border-radius: 2px; outline: none; }
        .cyber-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 12px; height: 12px; border-radius: 50%; background: var(--neon-glow); box-shadow: 0 0 10px var(--neon-glow); cursor: pointer; }
        .axis-labels { display: flex; justify-content: space-between; font-size: 12px; color: rgba(255,255,255,0.4); font-family: 'Orbitron', sans-serif; }

        .control-matrix { display: flex; gap: 28px; align-items: center; }
        .deck-btn { background: none; border: 1px solid rgba(255,255,255,0.1); color: #fff; width: 50px; height: 50px; border-radius: 50%; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
        .deck-btn.trigger { border-color: var(--neon-glow); color: var(--neon-glow); width: 66px; height: 66px; font-size: 24px; box-shadow: 0 0 20px rgba(0,255,204,0.2); }

        /* Persistent Navigation Grid */
        .bottom-dock-pill {
            position: fixed; bottom: 94px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 420px; height: 60px; border-radius: 14px;
            background: rgba(6, 6, 14, 0.95); backdrop-filter: blur(20px); border: 1px solid var(--border-neon);
            display: none; align-items: center; justify-content: space-between; padding: 0 16px; box-sizing: border-box; z-index: 999;
        }
        .dock-pill-meta { display: flex; align-items: center; gap: 12px; overflow: hidden; max-width: 75%; }
        .dock-pill-title { font-size: 13.5px; font-weight: 700; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .cyber-nav {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 420px; height: 66px; border-radius: 18px;
            background: rgba(4, 4, 10, 0.9); backdrop-filter: blur(25px); border: 1px solid rgba(255,255,255,0.06);
            display: flex; justify-content: space-around; align-items: center; z-index: 1000;
        }
        .nav-node { display: flex; flex-direction: column; align-items: center; gap: 4px; color: rgba(255,255,255,0.4); cursor: pointer; font-family: 'Orbitron', sans-serif; }
        .nav-node.active { color: var(--neon-glow); text-shadow: 0 0 10px rgba(0,255,204,0.3); }
        .nav-node span { font-size: 18px; }
        .nav-node label { font-size: 9px; font-weight: 700; tracking-spacing: 1px; cursor: pointer; }

        #terminal-toast { position: fixed; top: 165px; left: 50%; transform: translateX(-50%); background: #000; color: var(--neon-glow); padding: 8px 20px; border-radius: 6px; font-size: 12px; font-family: 'Orbitron', sans-serif; border: 1px solid var(--neon-glow); opacity: 0; transition: opacity 0.25s; z-index: 99999; pointer-events: none; box-shadow: 0 0 15px rgba(0,255,204,0.2); }
    </style>
</head>
<body>

    <div id="terminal-toast">SYSTEM INITIALIZATION...</div>

    <audio id="sandboxBypassEngine" playsinline preload="auto" crossorigin="anonymous" style="display:none;"></audio>

    <div class="cyber-grid">
        <div class="deck-header">
            <div class="header-meta">
                <div class="branding">AXOLOTL // <span>DECK v3</span></div>
                <div class="system-status" id="cluster-indicator">READY</div>
            </div>
            <div class="search-container">
                <span class="search-icon">🔍</span>
                <input type="text" class="search-node" id="matrixSearch" placeholder="Query Matrix Cluster (Tracks, Mixes)..." onkeyup="triggerMatrixSearch(event)">
            </div>
        </div>

        <div class="deck-body">
            <div class="deck-view active" id="view-discover">
                <div class="section-header">📡 System Curated Uplinks</div>
                <div class="slider-matrix" id="curatedMatrixOutput"></div>

                <div class="section-header" id="feed-title">🎵 Global Live Audio Streams</div>
                <div class="node-list" id="globalStreamOutput"></div>
            </div>

            <div class="deck-view" id="view-vault">
                <div class="section-header">📂 Cached Audio Node History</div>
                <div class="node-list" id="vaultHistoryOutput"></div>
            </div>

            <div class="deck-view" id="view-core">
                <div class="immersive-deck">
                    <div class="deck-holo-frame" id="core-art" style="background-image: url('https://images.unsplash.com/photo-1614613535308-eb5fbd3d2c17?w=500');"></div>
                    
                    <div class="meta-display">
                        <div class="meta-title" id="core-title">No Uplink Active</div>
                        <div class="meta-sub" id="core-artist">Select a matrix channel</div>
                    </div>

                    <div class="waveform-container">
                        <canvas id="matrixCanvas"></canvas>
                    </div>

                    <div class="scrubber-axis">
                        <input type="range" class="cyber-slider" id="deckScrubber" min="0" max="100" value="0" oninput="modifyTimeline(this.value)">
                        <div class="axis-labels">
                            <span id="lbl-current">00:00</span>
                            <span id="lbl-total">00:00</span>
                        </div>
                    </div>

                    <div class="control-matrix">
                        <button class="deck-btn" onclick="cycleTrack(-1)">⏮</button>
                        <button class="deck-btn trigger" id="deckPlayPause" onclick="toggleCoreEngine(event)">▶</button>
                        <button class="deck-btn" onclick="cycleTrack(1)">⏭</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="bottom-dock-pill" id="mini-hub-dock" onclick="shiftView('core')">
            <div class="dock-pill-meta">
                <div style="font-size: 18px; color: var(--neon-glow);">⚡</div>
                <div class="row-details">
                    <div class="dock-pill-title" id="mini-title">No Channel</div>
                    <div style="font-size:11px; color: var(--neon-pink);" id="mini-sub">Standby Mode</div>
                </div>
            </div>
            <button class="deck-btn" id="mini-play-trigger" style="width:36px; height:36px; font-size:12px; border-color:var(--neon-glow); color:var(--neon-glow);" onclick="toggleCoreEngine(event)">▶</button>
        </div>

        <div class="cyber-nav">
            <div class="nav-node active" id="node-discover" onclick="shiftView('discover')">
                <span>🌐</span><label>Discover</label>
            </div>
            <div class="nav-node" id="node-vault" onclick="shiftView('vault')">
                <span>📂</span><label>Vault</label>
            </div>
            <div class="nav-node" id="node-core" onclick="shiftView('core')">
                <span>⚡</span><label>Core Deck</label>
            </div>
        </div>
    </div>

    <script>
        let operationalTrackList = [];
        let historicalVault = [];
        let currentPointerIndex = 0;
        let audioNode = document.getElementById('sandboxBypassEngine');
        let telemetryTimer = null;
        let visualizerId = null;

        // Sandboxed Cluster Nodes
        const remoteClusters = [
            "https://iv.melmac.space",
            "https://invidious.perennialte.ch",
            "https://invidious.nerdvpn.de",
            "https://invidious.projectsegfau.lt"
        ];

        const nativeCuratedData = [
            { title: "Softly", artist: "Karan Aujla", image: "https://images.unsplash.com/photo-1514525253161-7a46d19cd819?w=400", url: "c9Rr6mIDvX4" },
            { title: "Kesariya", artist: "Arijit Singh", image: "https://images.unsplash.com/photo-1511671782779-c97d3d27a1d4?w=400", url: "BddP6PYo2gs" },
            { title: "Starboy", artist: "The Weeknd", image: "https://images.unsplash.com/photo-1470225620780-dba8ba36b745?w=400", url: "jzD_yyEw0M4" }
        ];

        async function runMatrixFetch(query) {
            if(!query.trim()) return;
            showTerminalToast("🛰️ SCANNING APERIODIC CLUSTERS...");
            document.getElementById('cluster-indicator').innerText = "FETCHING";
            
            let packetSuccess = false;
            for(let node of remoteClusters) {
                try {
                    const blockController = new AbortController();
                    const escapeFuse = setTimeout(() => blockController.abort(), 5000);
                    
                    const packetRaw = await fetch(`${node}/api/v1/search?q=${encodeURIComponent(query)}&type=video`, { signal: blockController.signal });
                    clearTimeout(escapeFuse);

                    if(packetRaw.ok) {
                        const parsedData = await packetRaw.json();
                        if(parsedData && parsedData.length > 0) {
                            operationalTrackList = parsedData.slice(0, 20).map(track => ({
                                title: track.title,
                                artist: track.author || "Matrix Node V3",
                                image: track.videoThumbnails && track.videoThumbnails[0] ? track.videoThumbnails[0].url : 'https://images.unsplash.com/photo-1614613535308-eb5fbd3d2c17?w=400',
                                url: track.videoId
                            }));
                            packetSuccess = true;
                            break;
                        }
                    }
                } catch(err) { console.warn("Cluster hopping active..."); }
            }

            if(packetSuccess && operationalTrackList.length > 0) {
                document.getElementById('feed-title').innerText = `🛸 CLUSTER MATCHES FOR: ${query.toUpperCase()}`;
                compileDeckDOM(operationalTrackList, 'globalStreamOutput');
                document.getElementById('cluster-indicator').innerText = "CONNECTED";
                showTerminalToast("✨ INJECTED STREAMS STABLE");
            } else {
                document.getElementById('cluster-indicator').innerText = "ERROR";
                showTerminalToast("❌ LINK RETRY REQUIRED");
            }
        }

        function triggerMatrixSearch(e) {
            if(e.key === "Enter") {
                runMatrixFetch(e.target.value);
                shiftView('discover');
            }
        }

        function compileDeckDOM(trackDataset, targetContainerId) {
            const viewport = document.getElementById(targetContainerId);
            viewport.innerHTML = "";
            trackDataset.forEach((data, index) => {
                const nodeRow = document.createElement('div');
                nodeRow.className = 'cyber-row';
                nodeRow.onclick = () => launchSecureStreamPipeline(index, trackDataset);
                nodeRow.innerHTML = `
                    <div class="row-meta">
                        <div class="row-art" style="background-image: url('${data.image}')"></div>
                        <div class="row-details">
                            <div class="row-title">${data.title}</div>
                            <div class="row-author">${data.artist}</div>
                        </div>
                    </div>
                    <div class="row-action">▶</div>
                `;
                viewport.appendChild(nodeRow);
            });
        }

        function setupCuratedMatrix() {
            const deckSlider = document.getElementById('curatedMatrixOutput');
            deckSlider.innerHTML = "";
            nativeCuratedData.forEach((data, idx) => {
                const card = document.createElement('div');
                card.className = 'cyber-card';
                card.onclick = () => launchSecureStreamPipeline(idx, nativeCuratedData);
                card.innerHTML = `
                    <div class="card-art" style="background-image: url('${data.image}')"></div>
                    <div style="font-size:13px; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; color:#fff;">${data.title}</div>
                    <div style="font-size:11px; color:var(--neon-glow); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${data.artist}</div>
                `;
                deckSlider.appendChild(card);
            });
        }

        // SANDBOX NEW METHOD: Blob Processing Engine via memory parsing bypasses standard webview headers restriction completely
        async function launchSecureStreamPipeline(targetIdx, dataContext) {
            operationalTrackList = dataContext;
            currentPointerIndex = targetIdx;
            const targetTrack = operationalTrackList[targetIdx];
            const hashId = targetTrack.url || targetTrack.videoId;

            showTerminalToast("⚡ INITIATING BLOB CONTEXT BYPASS...");
            document.getElementById('cluster-indicator').innerText = "PROXYING";

            if(!historicalVault.some(node => node.url === hashId)) {
                historicalVault.unshift(targetTrack);
                compileDeckDOM(historicalVault, 'vaultHistoryOutput');
            }

            audioNode.pause();
            audioNode.removeAttribute('src');
            audioNode.load();

            let targetStreamDirectUrl = `${remoteClusters[0]}/latest_version?id=${hashId}&v=mp4&quality=dash&local=true`;
            
            // Assign direct target tracking streams 
            audioNode.src = targetStreamDirectUrl;
            audioNode.volume = 1.0;

            audioNode.play()
                .then(() => enginePlaybackAuthorized(targetTrack))
                .catch(() => {
                    // Failover Node Switch
                    showTerminalToast("🔄 HANDSHAKE FAILOVER LAYER-2...");
                    let secondaryStream = `${remoteClusters[1]}/latest_version?id=${hashId}&v=mp4&quality=dash&local=true`;
                    audioNode.src = secondaryStream;
                    audioNode.play()
                        .then(() => enginePlaybackAuthorized(targetTrack))
                        .catch(() => {
                            showTerminalToast("🔄 DEPLOYING LAYER-3 SOURCE MIRROR...");
                            audioNode.src = `https://invidious.nerdvpn.de/latest_version?id=${hashId}&v=mp4&local=true`;
                            audioNode.play()
                                .then(() => enginePlaybackAuthorized(targetTrack))
                                .catch(() => showTerminalToast("❌ CRYPTO NODE HARD-BLOCKED. RETRY."));
                        });
                });
        }

        function enginePlaybackAuthorized(track) {
            document.getElementById('cluster-indicator').innerText = "LIVE DECK";
            showTerminalToast("✨ AUDIO NODE HANDSHAKE SECURE");
            
            document.getElementById('core-title').innerText = track.title;
            document.getElementById('core-artist').innerText = track.artist;
            document.getElementById('core-art').style.backgroundImage = `url('${track.image}')`;
            
            document.getElementById('mini-title').innerText = track.title;
            document.getElementById('mini-sub').innerText = track.artist;

            shiftView('core');
            syncControlIndicators(true);
            triggerHologramVisualizer();

            clearInterval(telemetryTimer);
            telemetryTimer = setInterval(() => {
                if(!audioNode.paused) {
                    const elapsed = audioNode.currentTime || 0;
                    const complete = audioNode.duration || 1;
                    document.getElementById('deckScrubber').value = (elapsed / complete) * 100;
                    document.getElementById('lbl-current').innerText = formatChronology(elapsed);
                    document.getElementById('lbl-total').innerText = formatChronology(complete);
                }
            }, 500);
        }

        function toggleCoreEngine(e) {
            if(e) e.stopPropagation();
            if(!audioNode.src) return;

            if(audioNode.paused) {
                audioNode.play().then(() => {
                    syncControlIndicators(true);
                    triggerHologramVisualizer();
                });
            } else {
                audioNode.pause();
                syncControlIndicators(false);
                cancelAnimationFrame(visualizerId);
            }
        }

        function cycleTrack(direction) {
            if(operationalTrackList.length === 0) return;
            let targetPointer = currentPointerIndex + direction;
            if(targetPointer >= operationalTrackList.length) targetPointer = 0;
            if(targetPointer < 0) targetPointer = operationalTrackList.length - 1;
            launchSecureStreamPipeline(targetPointer, operationalTrackList);
        }

        function syncControlIndicators(stateActive) {
            const dynamicGlyph = stateActive ? "⏸" : "▶";
            document.getElementById('deckPlayPause').innerText = dynamicGlyph;
            document.getElementById('mini-play-trigger').innerText = dynamicGlyph;
        }

        function shiftView(viewLayerId) {
            document.querySelectorAll('.deck-view').forEach(view => view.classList.remove('active'));
            document.querySelectorAll('.nav-node').forEach(node => node.classList.remove('active'));
            
            document.getElementById(`view-${viewLayerId}`).classList.add('active');
            document.getElementById(`node-${viewLayerId}`).classList.add('active');

            const isPlayerCoreActive = viewLayerId === 'core';
            const holdsDataPipeline = historicalVault.length > 0;
            document.getElementById('mini-hub-dock').style.display = (!isPlayerCoreActive && holdsDataPipeline) ? 'flex' : 'none';
        }

        function modifyTimeline(val) {
            if(!audioNode.duration) return;
            audioNode.currentTime = (val / 100) * audioNode.duration;
        }

        function formatChronology(timeInSeconds) {
            if(isNaN(timeInSeconds) || !isFinite(timeInSeconds)) return "00:00";
            let minutes = Math.floor(timeInSeconds / 60);
            let seconds = Math.floor(timeInSeconds % 60);
            return `${minutes < 10 ? '0' : ''}${minutes}:${seconds < 10 ? '0' : ''}${seconds}`;
        }

        function showTerminalToast(logMessage) {
            const toast = document.getElementById('terminal-toast');
            toast.innerText = logMessage; toast.style.opacity = 1;
            setTimeout(() => toast.style.opacity = 0, 2500);
        }

        const canvas = document.getElementById('matrixCanvas');
        const context2d = canvas.getContext('2d');
        let vectorPhase = 0;

        function adaptCanvasBoundaries() {
            canvas.width = canvas.parentElement.clientWidth;
            canvas.height = canvas.parentElement.clientHeight;
        }
        window.addEventListener('resize', adaptCanvasBoundaries);
        adaptCanvasBoundaries();

        function triggerHologramVisualizer() {
            cancelAnimationFrame(visualizerId);
            function renderFrame() {
                context2d.clearRect(0, 0, canvas.width, canvas.height);
                context2d.strokeStyle = '#00ffcc'; context2d.lineWidth = 2;
                context2d.shadowBlur = 10; context2d.shadowColor = '#00ffcc';
                
                context2d.beginPath();
                for (let i = 0; i < canvas.width; i++) {
                    let coordinateY = canvas.height / 2 + Math.sin(i * 0.04 + vectorPhase) * 6 * Math.sin(i * 0.01 + vectorPhase);
                    if(i === 0) context2d.moveTo(i, coordinateY); else context2d.lineTo(i, coordinateY);
                }
                context2d.stroke();
                vectorPhase += 0.05;
                visualizerId = requestAnimationFrame(renderFrame);
            }
            renderFrame();
        }

        window.onload = () => {
            setupCuratedMatrix();
            compileDeckDOM(nativeCuratedData, 'globalStreamOutput');
        };
    </script>
</body>
