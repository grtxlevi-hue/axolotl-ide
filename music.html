<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YT Music Cyber Clone</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-black: #030303;
            --bg-surface: #212121;
            --yt-red: #ff0000;
            --text-main: #ffffff;
            --text-muted: #aaa;
        }

        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            background-color: var(--bg-black); color: var(--text-main);
            font-family: 'Roboto', sans-serif; overflow: hidden; display: flex; flex-direction: column;
        }

        /* YT Music Style Header */
        .yt-header {
            background-color: #000; padding: 10px 16px;
            display: flex; align-items: center; justify-content: space-between;
            border-bottom: 1px solid #1f1f1f;
        }
        .logo { font-size: 18px; font-weight: bold; color: #fff; display: flex; align-items: center; gap: 6px; }
        .logo span { color: var(--yt-red); }

        /* Real Search Container */
        .search-container {
            display: flex; align-items: center; background: #1a1a1a;
            border: 1px solid #333; border-radius: 8px; padding: 4px 12px; width: 50%; max-width: 400px;
        }
        .search-input {
            background: transparent; border: none; color: white; width: 100%;
            outline: none; font-size: 14px; padding: 6px 0;
        }
        .search-btn {
            background: transparent; border: none; color: var(--text-muted); cursor: pointer; font-size: 16px;
        }

        /* Workspace Layout */
        .main-layout { display: flex; flex: 1; height: calc(100% - 140px); overflow: hidden; }
        
        .sidebar {
            width: 200px; background: #000; padding: 15px; display: flex; flex-direction: column; gap: 12px;
            border-right: 1px solid #1f1f1f; box-sizing: border-box;
        }
        @media (max-width: 600px) {
            .sidebar { width: 65px; padding: 10px 5px; align-items: center; }
            .sidebar span { display: none; }
        }

        .side-btn {
            background: transparent; border: none; color: white; padding: 10px;
            text-align: left; font-size: 14px; font-weight: 500; cursor: pointer; border-radius: 6px; width: 100%;
        }
        .side-btn:hover, .side-btn.active { background: #212121; }

        /* Dynamic Track Explorer Grid */
        .content-area { flex: 1; padding: 20px; overflow-y: auto; box-sizing: border-box; }
        .section-title { font-size: 20px; font-weight: bold; margin-bottom: 15px; }

        .yt-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 16px;
        }
        .yt-card {
            background: transparent; padding: 8px; border-radius: 6px; cursor: pointer; transition: 0.2s;
        }
        .yt-card:hover { background: #1a1a1a; }
        .yt-card img { width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: 4px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .yt-title { font-size: 13px; font-weight: 500; margin: 6px 0 2px 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .yt-artist { font-size: 11px; color: var(--text-muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        /* Bottom Stream Player Bar */
        .player-bar {
            height: 85px; background: #101010; border-top: 1px solid #1f1f1f;
            display: flex; align-items: center; justify-content: space-between; padding: 0 16px; box-sizing: border-box;
        }
        .track-info { display: flex; align-items: center; gap: 12px; width: 35%; min-width: 140px; }
        .track-info img { width: 48px; height: 48px; border-radius: 3px; object-fit: cover; background: #222; }
        .track-meta { display: flex; flex-direction: column; overflow: hidden; }
        .track-name { font-size: 13px; font-weight: bold; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .track-singer { font-size: 11px; color: var(--text-muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        .audio-container { width: 40%; display: flex; justify-content: center; }
        audio { width: 100%; max-width: 450px; filter: invert(1); outline: none; }
    </style>
</head>
<body>

    <div class="yt-header">
        <div class="logo"><span>🔴</span> Music</div>
        
        <div class="search-container">
            <input type="text" class="search-input" id="search-box" placeholder="Search songs, artists, albums..." onkeypress="handleKeyPress(event)">
            <button class="search-btn" onclick="searchMusicAPI()">🔍</button>
        </div>
    </div>

    <div class="main-layout">
        <div class="sidebar">
            <button class="side-btn active" onclick="loadTrending()">🏠 <span>Home</span></button>
            <button class="side-btn" onclick="createPlaylist()">➕ <span>New Playlist</span></button>
            <div style="font-size: 10px; color: var(--text-muted); font-weight: bold; margin-top: 10px;" id="playlist-header">PLAYLISTS</div>
            <div id="playlist-list" style="display:flex; flex-direction:column; gap:4px;"></div>
        </div>

        <div class="content-area">
            <div class="section-title" id="view-title">Trending Now</div>
            <div class="yt-grid" id="songs-container">
                </div>
        </div>
    </div>

    <div class="player-bar">
        <div class="track-info">
            <img id="player-art" src="" alt="">
            <div class="track-meta">
                <div class="track-name" id="player-title">No Track Selected</div>
                <div class="track-singer" id="player-artist">Search and play anything</div>
            </div>
        </div>
        <div class="audio-container">
            <audio id="audio-player" controls src=""></audio>
        </div>
        <div style="width: 20px;"></div>
    </div>

    <script>
        // Open-Source Public Saavn API Instance Endpoint URL
        const API_BASE = "https://saavn.dev/api";
        let playlists = JSON.parse(localStorage.getItem('yt_playlists')) || {};

        // Initial Boot Setup (Loads trending items or defaults)
        async function loadTrending() {
            document.getElementById('view-title').innerText = "Trending Tracks";
            document.getElementById('songs-container').innerHTML = "<div style='color:var(--text-muted)'>Loading fresh streams...</div>";
            try {
                // Fetching from a reliable open music stream catalog source
                let response = await fetch(`${API_BASE}/search/songs?query=Trending`);
                let json = await response.json();
                if(json.success && json.data.results) {
                    renderCards(json.data.results);
                }
            } catch (err) {
                document.getElementById('songs-container').innerHTML = "<div style='color:red'>API Server Error. Try searching manually above!</div>";
            }
        }

        // Live Cloud Global Search Engine Logic
        async function searchMusicAPI() {
            const query = document.getElementById('search-box').value.trim();
            if(!query) return;

            document.getElementById('view-title').innerText = `Search results for: "${query}"`;
            document.getElementById('songs-container').innerHTML = "<div style='color:var(--text-muted)'>Searching cloud database...</div>";

            try {
                let res = await fetch(`${API_BASE}/search/songs?query=${encodeURIComponent(query)}`);
                let json = await res.json();
                if(json.success && json.data.results && json.data.results.length > 0) {
                    renderCards(json.data.results);
                } else {
                    document.getElementById('songs-container').innerHTML = "<div style='color:var(--text-muted)'>No tracks found. Try another keywords!</div>";
                }
            } catch (error) {
                document.getElementById('songs-container').innerHTML = "<div style='color:red'>Network Timeout. Please try again!</div>";
            }
        }

        function handleKeyPress(e) { if(e.key === 'Enter') searchMusicAPI(); }

        // Dynamic Interface Compiler
        function renderCards(songsArray) {
            const container = document.getElementById('songs-container');
            container.innerHTML = "";

            songsArray.forEach(song => {
                // Selecting mid-quality image safely from array mapping response
                let image = song.image && song.image[1] ? song.image[1].url : "https://images.unsplash.com/photo-1614613535308-eb5fbd3d2c17?w=150";
                // Finding optimal working .mp3 stream quality links safely
                let streamUrl = song.downloadUrl && song.downloadUrl[2] ? song.downloadUrl[2].url : (song.downloadUrl ? song.downloadUrl[0].url : "");
                
                // Sanitizing titles safely for internal onclick bindings 
                let sanitizedTitle = song.name.replace(/['"]/g, "");
                let sanitizedArtist = song.artists.primary && song.artists.primary[0] ? song.artists.primary[0].name.replace(/['"]/g, "") : "Unknown Artist";

                container.innerHTML += `
                    <div class="yt-card" onclick="streamAudioEngine('${streamUrl}', '${sanitizedTitle}', '${sanitizedArtist}', '${image}')">
                        <img src="${image}">
                        <div class="yt-title">${song.name}</div>
                        <div class="yt-artist">${sanitizedArtist}</div>
                        <button style="width:100%; margin-top:6px; background:#292929; border:none; color:white; font-size:10px; padding:3px 0; border-radius:3px; cursor:pointer;" onclick="event.stopPropagation(); addToCustomPlaylist('${song.id}', '${sanitizedTitle}', '${sanitizedArtist}', '${image}', '${streamUrl}')">➕ Playlist</button>
                    </div>
                `;
            });
        }

        // Direct Global Play Hook
        function streamAudioEngine(url, title, artist, img) {
            if(!url) return alert("Streaming source link unavailable for this specific node item.");
            document.getElementById('player-art').src = img;
            document.getElementById('player-title').innerText = title;
            document.getElementById('player-artist').innerText = artist;

            const player = document.getElementById('audio-player');
            player.src = url;
            player.load();
            player.play();
        }

        // Playlist Array Compilers (Saves full song object data structures inside user local node memory)
        function createPlaylist() {
            let name = prompt("Enter playlist namespace:"); if(!name || !name.trim()) return;
            let key = name.trim();
            if(!playlists[key]) { playlists[key] = []; savePlaylists(); syncSidebar(); }
        }

        function syncSidebar() {
            const wrapper = document.getElementById('playlist-list'); wrapper.innerHTML = "";
            Object.keys(playlists).forEach(name => {
                wrapper.innerHTML += `<button class="side-btn" style="font-size:12px; padding:5px 10px;" onclick="viewPlaylist('${name}')">🎵 <span>${name}</span></button>`;
            });
        }

        function addToCustomPlaylist(id, title, artist, img, url) {
            let listKeys = Object.keys(playlists); if(listKeys.length === 0) return alert("Pehle ek Playlist banayein!");
            let target = prompt(`Select playlist name:\n\nAvailables: ${listKeys.join(', ')}`);
            if(playlists[target]) {
                if(!playlists[target].some(track => track.id === id)) {
                    playlists[target].push({ id, name: title, artists: { primary: [{ name: artist }] }, image: [{}, { url: img }], downloadUrl: [{}, {}, { url }] });
                    savePlaylists(); alert("Added successfully!");
                }
            }
        }

        function viewPlaylist(name) {
            document.getElementById('view-title').innerText = `Playlist: ${name}`;
            renderCards(playlists[name] || []);
        }

        function savePlaylists() { localStorage.setItem('yt_playlists', JSON.stringify(playlists)); }

        window.onload = () => { loadTrending(); syncSidebar(); Telegram.WebApp.ready(); Telegram.WebApp.expand(); }
    </script>
</body>
</html>
